<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BICO-D | Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">

<div class="bg">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<div class="login-container">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="30" cy="30" r="8" fill="currentColor"/>
        <rect x="4"  y="26" width="14" height="8" rx="4" fill="currentColor" opacity=".7"/>
        <rect x="42" y="26" width="14" height="8" rx="4" fill="currentColor" opacity=".7"/>
        <rect x="26" y="4"  width="8" height="14" rx="4" fill="currentColor" opacity=".7"/>
        <rect x="26" y="42" width="8" height="14" rx="4" fill="currentColor" opacity=".7"/>
        <circle cx="11" cy="11" r="4" fill="currentColor" opacity=".35"/>
        <circle cx="49" cy="11" r="4" fill="currentColor" opacity=".35"/>
        <circle cx="11" cy="49" r="4" fill="currentColor" opacity=".35"/>
        <circle cx="49" cy="49" r="4" fill="currentColor" opacity=".35"/>
      </svg>
    </div>
    <h1>BICO-D</h1>
    <p>Plateforme AgroTIC de gestion de drones</p>
  </div>

  <div class="card">
    <h2>Connexion à votre espace</h2>
    <div id="alertBox" class="alert-error" style="display:none"></div>

    <div class="form-group">
      <label>Adresse email</label>
      <input type="email" id="email" placeholder="votre@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>

    <div id="roleIndicator" class="role-indicator"></div>

    <button class="btn btn-primary btn-full" onclick="doLogin()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
      Se connecter
    </button>

    <div class="demo-section">
      <p>Comptes de démonstration</p>
      <div class="demo-btns">
        <button class="demo-btn" onclick="fillDemo('user')">👤 Utilisateur</button>
        <button class="demo-btn" onclick="fillDemo('admin')">🛡️ Administrateur</button>
      </div>
    </div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/login.js"></script>
</body>
</html>
