<?xml version="1.0" encoding="UTF-8"?>
<svg
  width="120"
  height="120"
  viewBox="0 0 120 120"
  xmlns="http://www.w3.org/2000/svg">

  <!-- Corps du drone -->
  <rect x="40" y="50" width="40" height="20" rx="4" fill="#2e7d32"/>

  <!-- Bras horizontaux -->
  <line x1="20" y1="60" x2="40" y2="60" stroke="#2e7d32" stroke-width="4"/>
  <line x1="80" y1="60" x2="100" y2="60" stroke="#2e7d32" stroke-width="4"/>

  <!-- Bras verticaux -->
  <line x1="60" y1="30" x2="60" y2="50" stroke="#2e7d32" stroke-width="4"/>
  <line x1="60" y1="70" x2="60" y2="90" stroke="#2e7d32" stroke-width="4"/>

  <!-- Hélices -->
  <circle cx="20" cy="60" r="8" fill="none" stroke="#4caf50" stroke-width="3"/>
  <circle cx="100" cy="60" r="8" fill="none" stroke="#4caf50" stroke-width="3"/>
  <circle cx="60" cy="30" r="8" fill="none" stroke="#4caf50" stroke-width="3"/>
  <circle cx="60" cy="90" r="8" fill="none" stroke="#4caf50" stroke-width="3"/>

</svg>
