<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>BICO-D | AgroTIC</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <button onclick="showSection('dashboard')">Dashboard</button>
        <button onclick="showSection('drones')">Drones</button>
        <button onclick="showSection('missions')">Missions</button>
    </nav>
    <main>
        <section id="dashboard" class="active">
            <h2>Dashboard</h2>
            <p>Libres : <span id="countFree">0</span></p>
            <p>En mission : <span id="countBusy">0</span></p>
        </section>
        <section id="drones">
            <h2>Flotte</h2>
            <table>
                <thead><tr><th>Nom</th><th>Capteur</th><th>Statut</th></tr></thead>
                <tbody id="droneTableBody"></tbody>
            </table>
        </section>
        <section id="missions">
            <h2>Planifier</h2>
            <form id="missionForm" onsubmit="event.preventDefault(); submitMission();">
                <input type="text" id="m_nom" placeholder="Nom Mission" required><br>
                <select id="m_drone_select" required></select><br>
                <input type="date" id="m_date" required><br>
                <button type="submit">Enregistrer</button>
            </form>
            <p id="missionStatusMsg"></p>
        </section>
    </main>
    <script src="js/app.js"></script>
</body>
</html>
